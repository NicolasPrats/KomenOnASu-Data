name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & validate sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install tectonic
        run: |
          # Version pinned intentionally for CI stability.
          # To upgrade: check https://github.com/tectonic-typesetting/tectonic/releases
          # and update the version number in both ci.yml and release.yml
          TECTONIC_VERSION="0.15.0"
          wget -qO tectonic.tar.gz \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf tectonic.tar.gz
          mkdir -p $HOME/.local/bin
          mv tectonic $HOME/.local/bin/tectonic
          chmod +x $HOME/.local/bin/tectonic

      - name: Add tectonic to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dvisvgm & svgo
        run: |
          sudo apt-get install -y dvisvgm
          sudo npm install -g svgo

      - name: Build (strict)
        run: python build.py --strict --data data --dist dist

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: KomenOnASu-dist-${{ github.sha }}
          path: dist/
          retention-days: 7
