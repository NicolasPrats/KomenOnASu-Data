name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & validate sources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install tectonic
        run: |
          curl --proto '=https' --tlsv1.2 -fsSL \
            https://drop.tectonic.typesetting.com/install.sh | sh

      - name: Add tectonic to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dvisvgm & svgo
        run: |
          sudo apt-get install -y dvisvgm
          sudo npm install -g svgo

      - name: Build (strict)
        run: python build.py --strict --data data --dist dist

      - name: Upload dist as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7
