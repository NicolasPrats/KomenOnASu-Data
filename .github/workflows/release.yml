name: Release

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  release:
    name: Build & publish release
    runs-on: ubuntu-latest
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true

    permissions:
      contents: write  # needed to create GitHub releases and push to gh-pages

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install tectonic
        run: |
          # Version pinned intentionally for CI stability.
          # To upgrade: check https://github.com/tectonic-typesetting/tectonic/releases
          # and update the version number in both ci.yml and release.yml
          TECTONIC_VERSION="0.15.0"
          wget -qO tectonic.tar.gz \
            "https://github.com/tectonic-typesetting/tectonic/releases/download/tectonic%40${TECTONIC_VERSION}/tectonic-${TECTONIC_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          tar -xzf tectonic.tar.gz
          mkdir -p $HOME/.local/bin
          mv tectonic $HOME/.local/bin/tectonic
          chmod +x $HOME/.local/bin/tectonic

      - name: Add tectonic to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dvisvgm & svgo
        run: |
          sudo apt-get install -y dvisvgm
          sudo npm install -g svgo

      - name: Compute version tag
        id: version
        run: |
          BASE=$(date -u +%Y-%m-%d)
          git fetch --tags
          EXISTING=$(git tag -l "${BASE}*" | sort -V | tail -1)
          if [ -z "$EXISTING" ]; then
            TAG="${BASE}"
          else
            SUFFIX="${EXISTING#${BASE}}"
            if [ -z "$SUFFIX" ]; then
              TAG="${BASE}-2"
            else
              N="${SUFFIX#-}"
              TAG="${BASE}-$((N + 1))"
            fi
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Version: ${TAG}"

      - name: Build (strict)
        run: python build.py --strict --data data --dist dist --version ${{ steps.version.outputs.tag }}

      - name: Package dist as zip
        run: |
          cd dist
          zip -r ../KomenOnASu-data-${{ steps.version.outputs.tag }}.zip .

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Data ${{ steps.version.outputs.tag }}"
          body: |
            Automated release from PR #${{ github.event.pull_request.number }}
            **${{ github.event.pull_request.title }}**

            ${{ github.event.pull_request.body }}
          files: KomenOnASu-data-${{ steps.version.outputs.tag }}.zip
          make_latest: true

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Deploy versioned dist to gh-pages
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          mkdir -p gh-pages/${VERSION}
          cp -r dist/. gh-pages/${VERSION}/

      - name: Update versions.json (keep 5 most recent)
        run: |
          cd gh-pages
          VERSION=${{ steps.version.outputs.tag }}

          # List all version folders sorted newest-first
          ALL=$(ls -d [0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9]* 2>/dev/null | sort -Vr)

          # Keep only 5, delete the rest
          KEEP=5
          COUNT=0
          VERSIONS_TO_KEEP=()
          for V in $ALL; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -le $KEEP ]; then
              VERSIONS_TO_KEEP+=("\"$V\"")
            else
              echo "Pruning old version: $V"
              rm -rf "$V"
            fi
          done

          # Write versions.json — newest first
          VERSIONS_JSON=$(IFS=,; echo "${VERSIONS_TO_KEEP[*]}")
          echo "{\"versions\": [${VERSIONS_JSON}]}" > versions.json
          echo "versions.json: [${VERSIONS_JSON}]"

      - name: Commit & push to gh-pages
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          cd gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "deploy: ${VERSION}"
          git push
